<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMBO STAFF</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; }
        #reader { width: 90%; max-width: 400px; margin: auto; border-radius: 20px; overflow: hidden; border: 2px solid #333; }
        .result-card { margin: 20px; padding: 25px; border-radius: 20px; background: #111; border: 4px solid #444; font-size: 1.4rem; font-weight: bold; }
        .success { border-color: #00ff00; color: #00ff00; background: #002200; }
        .error { border-color: #ff0000; color: #ff0000; background: #220000; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 15px;">BOMBO <span style="color: #888;">SCANNER</span></h2>
    <div id="reader"></div>
    <div id="card" class="result-card">LISTO</div>

    <script>
        // Configuración oficial
        const S_URL = "https://thomasrivadeneira.supabase.co";
        const S_KEY = "sb_publishable_Brzr6u-iwc7N_gku0rjNYw_jJqlEqnS";
        const supabase = supabase.createClient(S_URL, S_KEY);

        const html5QrCode = new Html5Qrcode("reader");

        async function verificar(codigo) {
            const card = document.getElementById("card");
            card.innerText = "VERIFICANDO...";
            
            try {
                // Consulta usando la librería oficial (más segura contra CORS)
                const { data, error } = await supabase
                    .from('access_codes')
                    .select('user_name')
                    .eq('code_value', codigo.trim());

                if (error) throw error;

                if (data && data.length > 0) {
                    card.className = "result-card success";
                    card.innerText = "ACCESO: " + data[0].user_name;
                } else {
                    card.className = "result-card error";
                    card.innerText = "CÓDIGO NO VÁLIDO";
                }
            } catch (e) {
                card.className = "result-card error";
                card.innerText = "ERROR DE CONEXIÓN";
                console.error("Detalle:", e);
            }
        }

        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            verificar(text);
        });
    </script>
</body>
</html>
