<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMBO STAFF</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #reader { width: 100%; max-width: 400px; margin: 20px auto; border-radius: 20px; overflow: hidden; }
        .result-card { margin: 20px; padding: 30px; border-radius: 20px; background: #111; border: 4px solid #333; font-weight: bold; font-size: 1.5rem; transition: 0.3s; }
        .success { border-color: #00ff00; color: #00ff00; background: #002200; }
        .error { border-color: #ff0000; color: #ff0000; background: #220000; }
        .loading { border-color: #ffff00; color: #ffff00; }
    </style>
</head>
<body>
    <h1 style="letter-spacing: 2px; margin-top: 30px;">BOMBO <span style="color: #666;">STAFF</span></h1>
    <div id="reader"></div>
    <div id="card" class="result-card">ESPERANDO QR...</div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const API_URL = "https://thomasrivadeneira.supabase.co/rest/v1/access_codes";
        const KEY = "sb_publishable_Brzr6u-iwc7N_gku0rjNYw_jJqlEqnS";

        async function checkAccess(code) {
            const card = document.getElementById("card");
            card.className = "result-card loading";
            card.innerText = "VERIFICANDO...";

            try {
                // Truco final: Usamos una petición que Supabase acepta casi siempre
                const response = await fetch(`${API_URL}?code_value=eq.${code.trim()}&select=*`, {
                    method: 'GET',
                    headers: {
                        'apikey': KEY,
                        'Authorization': `Bearer ${KEY}`,
                        'Range': '0-9' // Esto a veces engaña al CORS
                    }
                });

                const data = await response.json();

                if (data && data.length > 0) {
                    card.className = "result-card success";
                    card.innerText = "ACCESO: " + data[0].user_name;
                } else {
                    card.className = "result-card error";
                    card.innerText = "CÓDIGO INVÁLIDO";
                }
            } catch (err) {
                card.className = "result-card error";
                card.innerText = "ERROR DE CONEXIÓN";
                console.error(err);
            }
        }

        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            checkAccess(text);
        });
    </script>
</body>
</html>
