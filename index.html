<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMBO SCANNER</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 350px; margin: auto; border-radius: 15px; overflow: hidden; border: 2px solid #444; background: #111; }
        .result-card { margin-top: 20px; padding: 20px; border-radius: 15px; background: #1a1a1a; border: 3px solid #333; font-weight: bold; font-size: 1.2rem; }
        .success { border-color: #00ff00; color: #00ff00; }
        .error { border-color: #ff0000; color: #ff0000; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 20px;">BOMBO <span style="color: orange;">STAFF</span></h2>
    <div id="reader"></div>
    <div id="card" class="result-card">ESPERANDO QR...</div>
    <button onclick="location.reload()">RECARGAR CÁMARA</button>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const S_URL = "https://thomasrivadeneira.supabase.co/rest/v1/access_codes";
        const S_KEY = "sb_publishable_Brzr6u-iwc7N_gku0rjNYw_jJqlEqnS";

        async function verificar(codigo) {
            const card = document.getElementById("card");
            card.innerText = "VERIFICANDO...";
            
            try {
                // Petición ultra limpia para evitar errores de red
                const res = await fetch(`${S_URL}?code_value=eq.${codigo.trim()}&select=*`, {
                    headers: { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}` }
                });
                const data = await res.json();
                
                if (data && data.length > 0) {
                    card.className = "result-card success";
                    card.innerText = "ACCESO: " + data[0].user_name;
                } else {
                    card.className = "result-card error";
                    card.innerText = "CÓDIGO NO VÁLIDO";
                }
            } catch (e) {
                card.className = "result-card error";
                card.innerText = "ERROR DE RED";
            }
        }

        // Iniciar cámara con reintento automático
     // Reemplaza desde donde dice "const config..." hasta el final
const config = { 
    fps: 10, 
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0 // Esto ayuda a que los celulares no se confundan
};

function iniciarCamara() {
    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        (text) => { verificar(text); }
    ).catch(err => {
        // Si falla la trasera, intenta con cualquier cámara disponible
        html5QrCode.start({ facingMode: "user" }, config, (text) => { verificar(text); })
        .catch(e => {
            document.getElementById("card").innerText = "ACTIVA LA CÁMARA EN AJUSTES";
        });
    });
}

iniciarCamara();
    </script>
</body>
</html>
