<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOMBO STAFF</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; }
        #reader { width: 90%; max-width: 400px; margin: auto; border-radius: 20px; overflow: hidden; border: 2px solid #333; }
        .result-card { margin: 20px; padding: 25px; border-radius: 20px; background: #111; border: 4px solid #444; font-size: 1.4rem; font-weight: bold; }
        .success { border-color: #00ff00; color: #00ff00; }
        .error { border-color: #ff0000; color: #ff0000; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 15px;">BOMBO <span style="color: #888;">SCANNER</span></h2>
    <div id="reader"></div>
    <div id="card" class="result-card">ESPERANDO QR...</div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const S_URL = "https://thomasrivadeneira.supabase.co/rest/v1/access_codes";
        const S_KEY = "sb_publishable_Brzr6u-iwc7N_gku0rjNYw_jJqlEqnS";

        async function verificar(codigo) {
            const card = document.getElementById("card");
            card.innerText = "BUSCANDO...";
            
            // TRUCO FINAL: Usamos un proxy que "limpia" la conexión
            const proxy = "https://corsproxy.io/?"; 
            const finalUrl = `${proxy}${encodeURIComponent(S_URL + '?code_value=eq.' + codigo.trim() + '&select=*')}`;

            try {
                const res = await fetch(finalUrl, {
                    method: 'GET',
                    headers: { 
                        'apikey': S_KEY,
                        'Authorization': `Bearer ${S_KEY}`
                    }
                });

                const data = await res.json();
                
                if (data && data.length > 0) {
                    card.className = "result-card success";
                    card.innerText = "ACCESO: " + data[0].user_name;
                } else {
                    card.className = "result-card error";
                    card.innerText = "CÓDIGO NO VÁLIDO";
                }
            } catch (e) {
                card.className = "result-card error";
                card.innerText = "REINTENTE (DATOS MÓVILES)";
            }
        }

        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            verificar(text);
        });
    </script>
</body>
</html>
