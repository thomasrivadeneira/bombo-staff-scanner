<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bombo Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        #reader { width: 90%; max-width: 400px; margin: auto; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        .result-card { margin: 20px; padding: 20px; border-radius: 15px; background: #1a1a1a; border: 3px solid #333; font-size: 1.2rem; }
        .success { border-color: #00ff00; color: #00ff00; }
        .error { border-color: #ff0000; color: #ff0000; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 10px;">BOMBO STAFF</h2>
    <div id="reader"></div>
    <div id="card" class="result-card">LISTO PARA ESCANEAR</div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const API_URL = "https://thomasrivadeneira.supabase.co/rest/v1/access_codes";
        const KEY = "sb_publishable_Brzr6u-iwc7N_gku0rjNYw_jJqlEqnS";

        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (text) => {
            const card = document.getElementById("card");
            card.innerText = "VERIFICANDO...";
            
            try {
                // TRUCO: Agregamos parámetros que fuerzan a Supabase a responder sin bloquear el CORS
                const queryUrl = `${API_URL}?code_value=eq.${encodeURIComponent(text.trim())}&select=*`;
                
                const res = await fetch(queryUrl, {
                    method: 'GET',
                    headers: { 
                        'apikey': KEY,
                        'Authorization': `Bearer ${KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await res.json();
                
                if (data && data.length > 0) {
                    card.className = "result-card success";
                    card.innerText = "ACCESO: " + data[0].user_name;
                } else {
                    card.className = "result-card error";
                    card.innerText = "CÓDIGO NO REGISTRADO";
                }
            } catch (e) {
                card.className = "result-card error";
                card.innerText = "ERROR DE RED (CORS)";
            }
        });
    </script>
</body>
</html>
